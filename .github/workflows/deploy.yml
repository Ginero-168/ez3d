name: Build and Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      HOSTINGER_FTP_SERVER: ${{ secrets.HOSTINGER_FTP_SERVER }}
      HOSTINGER_FTP_USERNAME: ${{ secrets.HOSTINGER_FTP_USERNAME }}
      HOSTINGER_FTP_PASSWORD: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
      HOSTINGER_FTP_SERVER_DIR: ${{ secrets.HOSTINGER_FTP_SERVER_DIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages

      - name: Deploy to Hostinger via FTP
        if: ${{ env.HOSTINGER_FTP_SERVER != '' && env.HOSTINGER_FTP_USERNAME != '' && env.HOSTINGER_FTP_PASSWORD != '' }}
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ env.HOSTINGER_FTP_SERVER }}
          username: ${{ env.HOSTINGER_FTP_USERNAME }}
          password: ${{ env.HOSTINGER_FTP_PASSWORD }}
          local-dir: dist/
          server-dir: ${{ env.HOSTINGER_FTP_SERVER_DIR || '/public_html/' }}
          dangerous-clean-slate: false

      - name: Hostinger deploy skipped
        if: ${{ env.HOSTINGER_FTP_SERVER == '' || env.HOSTINGER_FTP_USERNAME == '' || env.HOSTINGER_FTP_PASSWORD == '' }}
        run: |
          echo "Hostinger FTP deploy skipped."
          echo "Add HOSTINGER_FTP_SERVER, HOSTINGER_FTP_USERNAME, HOSTINGER_FTP_PASSWORD, and optional HOSTINGER_FTP_SERVER_DIR repository secrets to enable it."
